<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHAMGO-PULSE</title>
  <meta name="description" content="CHAMGO-PULSE: Modern dashboard voor participatie, projecten en vergunningen." />
  <meta name="theme-color" content="#1976d2" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(120deg, #e3f2fd 0%, #fff 100%);
      color: #222;
    }
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a {
      color: #1976d2;
      text-decoration: none;
      transition: color 0.2s;
    }
    a:hover {
      color: #0d47a1;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
